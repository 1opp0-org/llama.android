jdk:
  - openjdk17

before_install:
  - echo "Linux version "
  - cat /etc/issue
  - uname -a
  - ldd --version
  # /lib/x86_64-linux-gnu/libc.so.6: version `GLIBC_2.28' not found (required by /opt/android-sdk-linux/cmake/3.31.6/bin/cmake)
  - echo "Accepting licenses for Android SDK"
  # Installing Java 8 because Android SDK manager needs XML Binds which not exists in JDK 17
  - sdk install java 8.0.265-open
  - sdk use java 8.0.265-open
  - yes | sdkmanager --licenses
  - yes | sdkmanager --install "cmake;3.22.1" > /dev/null
  - ldd /opt/android-sdk-linux/cmake/3.31.6/bin/cmake
  - echo "Install java17.... again"
  - sdk install java 17.0.12-oracle
  - sdk use java 17.0.12-oracle
install:
  - echo "Building project with JDK 17 - c++ code"
  - ./gradlew :llama-android-core:buildCMakeDebug --no-daemon
  - echo "Building project with JDK 17 - kotlin code"
  - ./gradlew :llama-android-core:publishToMavenLocal



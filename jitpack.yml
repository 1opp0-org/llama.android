jdk:
  - openjdk17

before_install:
  - echo "Linux version "
  - cat /etc/issue
  - uname -a
  - ldd --version

  # why do we install cmake and ninja manually? jitpack is stuck back on ubuntu 16.04,
  # and llama.cpp needs a modern version of cmake that needs a modern version of glibc.
  # So, instead of using android ecosystem to install cmake and ninja, we install them from
  # official repositories that are kind enough to link to a VERY old glibc version.
  - echo "Installing cmake 3.31.6 from  Kitware (official)"
  - mkdir -p ~/bin
  - wget https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-x86_64.tar.gz -P ~/bin --quiet > /dev/null
  - tar -xzf ~/bin/cmake-3.31.6-linux-x86_64.tar.gz -C ~/bin > /dev/null

  - echo "Installing ninja 1.12.1 from ninja-build (official)"
  - wget https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-linux.zip -P ~/bin > /dev/null
  - unzip ~/bin/ninja-linux.zip -d ~/bin/cmake-3.31.6-linux-x86_64/bin/ > /dev/null
  - chmod +x ~/bin/cmake-3.31.6-linux-x86_64/bin/ninja

  - echo "cmake.dir=$HOME/bin/cmake-3.31.6-linux-x86_64" >> local.properties
  - ldd ~/bin/cmake-3.31.6-linux-x86_64/bin/cmake
  - $HOME/bin/cmake-3.31.6-linux-x86_64/bin/ninja --version

  - echo "Accepting licenses for Android SDK"
  - sdk install java 8.0.265-open > /dev/null
  - sdk use java 8.0.265-open
  - yes | sdkmanager --licenses > /dev/null

  - echo "Revert back to java17"
  - sdk install java 17.0.12-oracle
  - sdk use java 17.0.12-oracle

install:
  - echo "Building project with JDK 17 - c++ code"
  - ./gradlew :llama-android-core:buildCMakeRelease --no-daemon
  - echo "Building project with JDK 17 - kotlin code"
  - ./gradlew :llama-android-core:publishToMavenLocal


